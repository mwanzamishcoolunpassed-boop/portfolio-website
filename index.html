<!DOCTYPE html>
<html>
<head>
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
      <button onclick="calc.add('7')">7</button>
      <button onclick="calc.add('8')">8</button>
      <button onclick="calc.add('9')">9</button>
      <button onclick="calc.add('/')">÷</button>

      <button onclick="calc.add('4')">4</button>
      <button onclick="calc.add('5')">5</button>
      <button onclick="calc.add('6')">6</button>
      <button onclick="calc.add('*')">×</button>

      <button onclick="calc.add('1')">1</button>
      <button onclick="calc.add('2')">2</button>
      <button onclick="calc.add('3')">3</button>
      <button onclick="calc.add('-')">−</button>


      <button onclick="calc.add('.')">.</button>
            <button onclick="calc.add('0')">0</button>
      <button onclick="calc.calculate()">=</button>
      <button onclick="calc.add('+')">+</button>

      <!-- Scientific -->
      <button class="trig" onclick="calc.sin()">sin</button>
      <button class="trig" onclick="calc.cos()">cos</button>
      <button class="trig" onclick="calc.tan()">tan</button>
      <button onclick="calc.sqrt()">√</button>

      <button onclick="calc.square()">x²</button>
      <button onclick="calc.log()">log</button>
      <button onclick="calc.pi()">π</button>
     
      
      
      <button onclick="calc.add('**')">^</button>
      <button onclick="calc.add('(')">(</button>
<button onclick="calc.add(')')">)</button>


 <button onclick="calc.clear()" id="sniper">C</button>
    </div>
  </div>


  
  
  

    <button id="toggleHistory">📜 History</button>
    <ul id="history" class="hidden"></ul>

    
        <button id="clearHistory">clear history</button>
  
    <button onclick="toggleMode()">🌙 / ☀️</button>
  


    <script src="main.js"></script>

</body>
</html>
